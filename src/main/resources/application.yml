spring:
  application:
    name: image-processing-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/image_service
    username: postgres
    password: 1234
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  redis:
    host: localhost
    port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour

aws:
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${AWS_BUCKET_NAME}
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    endpoint: ${AWS_ENDPOINT:} # Optional for custom endpoints like R2

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation}
  expiration: 86400000 # 24 hours in milliseconds

app:
  rate-limit:
    transformations-per-minute: 10
    uploads-per-minute: 5
  image:
    base-url: ${IMAGE_BASE_URL:http://localhost:8080}
    cache-control: max-age=31536000

server:
  port: 5555
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

logging:
  level:
    com.imageservice: DEBUG
    org.springframework.security: INFO